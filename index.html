function SimpleBarChart({data, height=180}){
  const max = Math.max(...data.map(d=>d.amount), 1);
  return <div style={{display:'flex',alignItems:'flex-end',gap:10,height,paddingTop:20}}>
    {data.map(d=>(
      <div key={d.day} style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',gap:6,height:'100%',justifyContent:'flex-end'}}>
        <div style={{fontSize:10,fontWeight:600,color:'#1B4332'}}>R{d.amount}</div>
        <div style={{width:'100%',background:'#10B981',borderRadius:'4px 4px 0 0',height:`${Math.max((d.amount/max)*(height-50),3)}px`,transition:'height .3s'}} />
        <div style={{fontSize:11,color:'#9CA3AF'}}>{d.day}</div>
      </div>
    ))}
  </div>;
}

/* ------------------------------- TOAST ----------------------------------- */
const ToastCtx = createContext(null);
function ToastProvider({children}){
  const [toasts,setToasts]=useState([]);
  const showToast=useCallback((message,type='success')=>{
    const id=Date.now()+Math.random();
    setToasts(p=>[...p,{id,message,type}]);
    setTimeout(()=>setToasts(p=>p.filter(t=>t.id!==id)),3000);
  },[]);
  const COLORS={success:'#1B4332',warning:'#F59E0B',error:'#EF4444',info:'#374151'};
  return <ToastCtx.Provider value={{showToast}}>
    {children}
    <div style={{position:'fixed',bottom:24,right:24,zIndex:999,display:'flex',flexDirection:'column',gap:8}}>
      {toasts.map(t=>(
        <div key={t.id} className="toast-enter" style={{background:COLORS[t.type],color:'#fff',padding:'12px 18px',borderRadius:10,fontSize:13,fontWeight:500,boxShadow:'0 4px 16px rgba(0,0,0,0.2)'}}>{t.message}</div>
      ))}
    </div>
  </ToastCtx.Provider>;
}
const useToast=()=>useContext(ToastCtx);

/* ---------------------------- DATA STORE (in-memory) ---------------------------- */
function useStore(seed){
  const [rows,setRows]=useState(seed);
  const add=(r)=>{const nr={id:'id-'+Date.now()+Math.random(),...r};setRows(p=>[nr,...p]);return nr;};
  const update=(id,patch)=>setRows(p=>p.map(r=>r.id===id?{...r,...patch}:r));
  const remove=(id)=>setRows(p=>p.filter(r=>r.id!==id));
  return {rows,add,update,remove};
}

function Students(){
  const {rows,add,update,remove} = useStore(seedStudents);
  const {showToast} = useToast();
  const [search,setSearch]=useState('');
  const [statusFilter,setStatusFilter]=useState('All');
  const [modalOpen,setModalOpen]=useState(false);
  const [editing,setEditing]=useState(null);
  const [form,setForm]=useState({});
  const STATUSES=['Active','On Hold','Test Ready','Passed','Withdrawn','Archived'];

  const filtered = rows.filter(s=>{
    const ms = !search || s.full_name.toLowerCase().includes(search.toLowerCase()) || s.id_number.includes(search) || s.phone.includes(search);
    const mf = statusFilter==='All' || s.status===statusFilter;
    return ms && mf;
  });
  const openAdd=()=>{setEditing(null);setForm({status:'Active',licence_code:'Code 8',lessons_completed:0});setModalOpen(true);};
  const openEdit=(s)=>{setEditing(s);setForm(s);setModalOpen(true);};
  const handleSave=()=>{
    if(!form.full_name||!form.id_number||!form.phone){showToast('Please fill required fields','error');return;}
    if(editing){update(editing.id,form);showToast('Student updated','success');}
    else{add(form);showToast('Student added','success');}
    setModalOpen(false);
  };

  return <div>
    <p style={{fontSize:13,color:'#6B7280',marginBottom:16}}>{rows.length} students registered</p>
    <div style={{display:'flex',gap:10,marginBottom:16,flexWrap:'wrap'}}>
      <input className="input" style={{flex:1,minWidth:200}} placeholder="Search by name, ID, phone..." value={search} onChange={e=>setSearch(e.target.value)} />
      <select className="input" style={{width:'auto'}} value={statusFilter} onChange={e=>setStatusFilter(e.target.value)}>
        <option>All</option>{STATUSES.map(s=><option key={s}>{s}</option>)}
      </select>
      <button className="btn btn-primary" onClick={openAdd}>+ Add Student</button>
      <button className="btn btn-secondary" onClick={()=>showToast('Exported to CSV','success')}>⬇ Export</button>
    </div>
    <div className="card" style={{overflow:'hidden'}}>

      </div>
      <div style={{background:'#E5E7EB',borderRadius:99,height:12,marginBottom:20}}><div style={{background:'#10B981',height:12,borderRadius:99,width:`${(avg/4)*100}%`}} /></div>
      {skillsList.map((skill,i)=>(
        <div key={skill} style={{display:'flex',alignItems:'center',gap:12,marginBottom:10}}>
          <div style={{fontSize:12,width:160,color:'#374151'}}>{skill}</div>
          <div style={{flex:1,background:'#E5E7EB',borderRadius:99,height:8}}><div style={{background:'#10B981',height:8,borderRadius:99,width:`${(scores[i]/4)*100}%`}} /></div>

}

function Payments(){
  const {rows,add} = useStore(seedPayments);
  const {showToast} = useToast();
  const [statusFilter,setStatusFilter]=useState('All');
  const [modalOpen,setModalOpen]=useState(false);
  const [form,setForm]=useState({});
  const STATUSES=['Paid in Full','Partially Paid','Outstanding','Overdue','Refunded','Cancelled'];
  const filtered = statusFilter==='All'?rows:rows.filter(p=>p.status===statusFilter);
  const totalCollected = rows.reduce((s,p)=>s+p.amount_paid,0);
  const outstanding = rows.reduce((s,p)=>s+(p.amount_due-p.amount_paid),0);
  const overdueCount = rows.filter(p=>p.status==='Overdue').length;
  const openAdd=()=>{setForm({student:seedStudents[0].full_name,method:'Cash'});setModalOpen(true);};
  const handleSave=()=>{
    if(!form.amount_due){showToast('Enter amount due','error');return;}
    const due=parseFloat(form.amount_due)||0, paid=parseFloat(form.amount_paid)||0;
    const status = paid>=due?'Paid in Full':paid>0?'Partially Paid':'Outstanding';
    add({...form,amount_due:due,amount_paid:paid,status,invoice_no:'INV-'+String(rows.length+1).padStart(3,'0'),date:new Date().toISOString().slice(0,10)});
    showToast('Payment recorded — receipt generated','success');setModalOpen(false);
  };

  return <div>
    <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:12,marginBottom:20}}>
      <div style={{background:'#1B4332',color:'#fff',borderRadius:12,padding:16,textAlign:'center'}}><div style={{fontSize:22,fontWeight:800}}>R {totalCollected.toLocaleString()}</div><div style={{fontSize:11,opacity:0.8,marginTop:4}}>Total Collected</div></div>
      <div style={{background:'#F59E0B',color:'#fff',borderRadius:12,padding:16,textAlign:'center'}}><div style={{fontSize:22,fontWeight:800}}>R {outstanding.toLocaleString()}</div><div style={{fontSize:11,opacity:0.8,marginTop:4}}>Outstanding</div></div>
      <div style={{background:'#EF4444',color:'#fff',borderRadius:12,padding:16,textAlign:'center'}}><div style={{fontSize:22,fontWeight:800}}>{overdueCount}</div><div style={{fontSize:11,opacity:0.8,marginTop:4}}>Overdue Accounts</div></div>
    </div>
    <div style={{display:'flex',gap:10,marginBottom:16,flexWrap:'wrap'}}>
      <input className="input" style={{flex:1,minWidth:200}} placeholder="Search by student, invoice..." />
      <select className="input" style={{width:'auto'}} value={statusFilter} onChange={e=>setStatusFilter(e.target.value)}><option>All</option>{STATUSES.map(s=><option key={s}>{s}</option>)}</select>
      <button className="btn btn-primary" onClick={openAdd}>+ Add Payment</button>
    </div>
    <div className="card" style={{overflow:'hidden'}}>
      <table style={{width:'100%',fontSize:13,borderCollapse:'collapse'}}>
        <thead><tr style={{background:'#1B4332',color:'#fff',fontSize:12}}>{['Invoice','Student','Service','Due','Paid','Balance','Status'].map(h=><th key={h} style={{textAlign:'left',padding:'10px 14px'}}>{h}</th>)}</tr></thead>
        <tbody>{filtered.map((p,i)=>(
          <tr key={p.id} style={{background:i%2===0?'#fff':'#FAFBFF'}}>
            <td style={{padding:'10px 14px',borderTop:'1px solid #F3F4F6',fontFamily:'monospace',fontSize:11}}>{p.invoice_no}</td>
            <td style={{padding:'10px 14px',borderTop:'1px solid #F3F4F6',fontWeight:500}}>{p.student}</td>
            <td style={{padding:'10px 14px',borderTop:'1px solid #F3F4F6'}}>{p.service}</td>
            <td style={{padding:'10px 14px',borderTop:'1px solid #F3F4F6'}}>R {p.amount_due.toLocaleString()}</td>
            <td style={{padding:'10px 14px',borderTop:'1px solid #F3F4F6'}}>R {p.amount_paid.toLocaleString()}</td>
            <td style={{padding:'10px 14px',borderTop:'1px solid #F3F4F6'}}><strong style={{color:p.amount_due-p.amount_paid>0?'#EF4444':'#10B981'}}>R {(p.amount_due-p.amount_paid).toLocaleString()}</strong></td>
            <td style={{padding:'10px 14px',borderTop:'1px solid #F3F4F6'}}><Badge status={p.status} /></td>
          </tr>
        ))}</tbody>
      </table>
    </div>
    <Modal open={modalOpen} onClose={()=>setModalOpen(false)} title="Add Payment">
      <FieldRow>
        <Field label="Student"><select className="input" value={form.student} onChange={e=>setForm({...form,student:e.target.value})}>{seedStudents.map(s=><option key={s.id}>{s.full_name}</option>)}</select></Field>
        <Field label="Service"><input className="input" onChange={e=>setForm({...form,service:e.target.value})} /></Field>
      </FieldRow>
      <FieldRow>
        <Field label="Amount Due (R)"><input className="input" type="number" onChange={e=>setForm({...form,amount_due:e.target.value})} /></Field>
        <Field label="Amount Paid (R)"><input className="input" type="number" onChange={e=>setForm({...form,amount_paid:e.target.value})} /></Field>
      </FieldRow>
      <div style={{display:'flex',justifyContent:'flex-end',gap:8,marginTop:8}}>
        <button className="btn btn-secondary" onClick={()=>setModalOpen(false)}>Cancel</button>
        <button className="btn btn-primary" onClick={handleSave}>Save Payment</button>
      </div>
    </Modal>
  </div>;
}

function ShareDemo(){
  const [link,setLink]=useState('');
  const {showToast} = useToast();
  const generate=()=>{
    const token='sdds-'+Math.random().toString(36).substr(2,10).toUpperCase();
    setLink(window.location.origin+window.location.pathname+'?demo='+token);
    showToast('Secure demo link generated','success');
  };
  return <div>
    <p style={{fontSize:13,color:'#6B7280',marginBottom:20}}>Generate a secure demo link to share with prospective clients</p>
    <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:16}}>
      <div className="card" style={{padding:20}}>
        <div style={{fontSize:13,fontWeight:700,color:'#1B4332',marginBottom:16}}>🔗 Generate Demo Link</div>
        <Field label="Expiry Period"><select className="input"><option>24 Hours</option><option>7 Days</option><option>14 Days</option></select></Field>
        <Field label="Client Name"><input className="input" placeholder="e.g. ABC Driving Academy" /></Field>
        <button className="btn btn-primary" style={{width:'100%',justifyContent:'center'}} onClick={generate}>Generate Secure Link</button>
      </div>
      <div className="card" style={{padding:20}}>
        <div style={{fontSize:13,fontWeight:700,color:'#1B4332',marginBottom:16}}>📋 Share Options</div>
        <div style={{background:'#F8FAFC',border:'1px solid #E5E7EB',borderRadius:8,padding:16,marginBottom:16,minHeight:70,display:'flex',alignItems:'center',justifyContent:'center',textAlign:'center'}}>
          {link?<code style={{fontSize:11,color:'#10B981',wordBreak:'break-all'}}>{link}</code>:<span style={{color:'#9CA3AF',fontSize:13}}>Generate a link to see share options</span>}
        </div>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8}}>
          <button className="btn btn-secondary" style={{fontSize:12}} onClick={()=>showToast('Link copied','success')}>Copy Link</button>
          <button className="btn btn-secondary" style={{fontSize:12}} onClick={()=>showToast('Email opened','info')}>Email Link</button>
        </div>
      </div>
    </div>
  </div>;
}
